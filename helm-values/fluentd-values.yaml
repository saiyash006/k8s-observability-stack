replicaCount: 1
tolerations:
  - operator: "Exists"
extraVolumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
  - name: varlogcontainers
    mountPath: /var/log/containers
    readOnly: true
extraVolumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
  - name: varlogcontainers
    hostPath:
      path: /var/log/containers
elasticsearch:
  host: elasticsearch.logging.svc.cluster.local
  port: 9200
  scheme: http
  logstash_format: true
resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 300m
    memory: 400Mi