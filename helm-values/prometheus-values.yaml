global:
  rbac:
    create: true

alertmanager:
  enabled: true

prometheus:
  prometheusSpec:
    scrapeInterval: 30s
    retention: 15d
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

grafana:
  adminUser: admin
  adminPassword: prom-operator
  service:
    type: ClusterIP
  defaultDashboardsEnabled: false
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: custom
          orgId: 1
          folder: Observability
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/custom
  dashboards:
    custom:
      pod-node-resources:
        json: |
          {
            "uid": "pod-node-resources",
            "title": "Pod & Node Resource Overview",
            "timezone": "browser",
            "schemaVersion": 38,
            "version": 1,
            "tags": ["kube-prom-stack"],
            "templating": {
              "list": [
                {"name": "namespace", "type": "query", "datasource": "Prometheus", "query": "label_values(kube_pod_info, namespace)", "refresh": 2},
                {"name": "pod", "type": "query", "datasource": "Prometheus", "query": "label_values(kube_pod_info{namespace=\"$namespace\"}, pod)", "refresh": 2}
              ]
            },
            "panels": [
              {"type": "stat", "title": "Node CPU %", "datasource": "Prometheus", "targets": [{"expr": "100 - (avg by(instance)(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)", "legendFormat": "{{instance}}"}]},
              {"type": "stat", "title": "Node Memory Used (GB)", "datasource": "Prometheus", "targets": [{"expr": "(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / 1024^3", "legendFormat": "{{instance}}"}]},
              {"type": "timeseries", "title": "Pod CPU (cores)", "datasource": "Prometheus", "targets": [{"expr": "sum by(pod) (rate(container_cpu_usage_seconds_total{image!='', namespace='$namespace', pod='$pod'}[5m]))", "legendFormat": "{{pod}}"}]},
              {"type": "timeseries", "title": "Pod Memory (MiB)", "datasource": "Prometheus", "targets": [{"expr": "sum by(pod) (container_memory_working_set_bytes{image!='', namespace='$namespace', pod='$pod'}) / 1024^2", "legendFormat": "{{pod}}"}]},
              {"type": "timeseries", "title": "Node Filesystem Usage %", "datasource": "Prometheus", "targets": [{"expr": "(1 - (node_filesystem_free_bytes{fstype!='tmpfs'} / node_filesystem_size_bytes{fstype!='tmpfs'})) * 100", "legendFormat": "{{instance}} {{mountpoint}}"}]}
            ]
          }
      pod-health-restarts:
        json: |
          {
            "uid": "pod-health-restarts",
            "title": "Pod Health & Restarts",
            "timezone": "browser",
            "schemaVersion": 38,
            "version": 1,
            "tags": ["kube-prom-stack"],
            "templating": {
              "list": [
                {"name": "namespace", "type": "query", "datasource": "Prometheus", "query": "label_values(kube_pod_info, namespace)", "refresh": 2}
              ]
            },
            "panels": [
              {"type": "timeseries", "title": "Container Restarts (15m rate)", "datasource": "Prometheus", "targets": [{"expr": "sum by(pod, container) (rate(kube_pod_container_status_restarts_total{namespace='$namespace'}[15m]))", "legendFormat": "{{pod}}/{{container}}"}]},
              {"type": "stat", "title": "Not Ready Pods", "datasource": "Prometheus", "targets": [{"expr": "count(kube_pod_status_ready{namespace='$namespace', condition='false'})", "legendFormat": "unready"}]},
              {"type": "timeseries", "title": "Pod Phase Counts", "datasource": "Prometheus", "targets": [{"expr": "sum by(phase) (kube_pod_status_phase{namespace='$namespace'})", "legendFormat": "{{phase}}"}]}
            ]
          }

defaultRules:
  create: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true